<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Tradr</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --blue:#2563EB; --amber:#F59E0B; --dark:#0F172A; --white:#FFFFFF; --grey:#94A3B8; --dark2:#1E293B; --dark3:#0D1526; --font:'Open Sans',sans-serif; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
.page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.page-wrap::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,0.12) 0%,transparent 70%);pointer-events:none;}
.page-wrap::after{content:'';position:absolute;bottom:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,0.06) 0%,transparent 70%);pointer-events:none;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;justify-content:center;margin-bottom:2rem;}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--white);}
.logo-word{font-size:22px;font-weight:800;color:var(--white);}
.card{background:var(--dark2);border:1px solid rgba(37,99,235,0.2);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--amber));border-radius:20px 20px 0 0;}
h1{font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:0.4rem;}
.sub{text-align:center;color:var(--grey);font-size:0.9rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:0.82rem;font-weight:600;color:var(--grey);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input{width:100%;background:var(--dark);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;color:var(--white);font-family:var(--font);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--blue);}
.form-group input::placeholder{color:rgba(148,163,184,0.5);}
.forgot{display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:1rem;}
.forgot a{font-size:0.82rem;color:var(--grey);text-decoration:none;transition:color 0.2s;}
.forgot a:hover{color:var(--blue);}
.btn-submit{width:100%;background:var(--blue);color:var(--white);border:none;border-radius:8px;padding:14px;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-submit:hover{background:#1D4ED8;transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,0.4);}
.divider{display:flex;align-items:center;gap:12px;margin:1.5rem 0;color:var(--grey);font-size:0.82rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
.bottom-link{text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--grey);}
.bottom-link a{color:var(--amber);text-decoration:none;font-weight:600;}
.bottom-link a:hover{text-decoration:underline;}
footer-bar{display:block;text-align:center;padding:1.5rem;border-top:1px solid rgba(255,255,255,0.05);color:var(--grey);font-size:0.8rem;}
.demo-hint{background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.2);border-radius:8px;padding:12px 16px;margin-bottom:1.5rem;font-size:0.82rem;color:#93C5FD;line-height:1.5;}
</style>
</head>
<body>
<div class="page-wrap">
  <div style="width:100%;max-width:420px;position:relative;z-index:1;">
    <a class="logo" href="index.html">
      <div class="logo-icon">T</div>
      <span class="logo-word">Tradr</span>
    </a>
    <div class="card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to manage your wholesale store</p>

      <div class="demo-hint">
        💡 <strong>Demo:</strong> Enter any email and password, then click Log In to access the dashboard.
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="you@yourbusiness.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="Your password">
      </div>
      <div class="forgot">
        <a href="#">Forgot your password?</a>
      </div>
      <button class="btn-submit" id="loginBtn">Log In →</button>
      <div class="divider">or</div>
      <p style="text-align:center;font-size:0.85rem;color:var(--grey);">New to Tradr? <a href="signup.html" style="color:var(--amber);font-weight:600;text-decoration:none;">Create your free store →</a></p>
    </div>
    <p class="bottom-link"><a href="index.html" style="color:var(--grey);">← Back to homepage</a></p>
  </div>
</div>
<footer-bar>© 2025 Tradr · Your wholesale catalogue platform</footer-bar>

<script>
document.getElementById('loginBtn').addEventListener('click', function() {
  const email = document.getElementById('emailInput').value;
  const pass = document.getElementById('passInput').value;
  if (!email || !pass) {
    this.textContent = 'Please fill in both fields';
    this.style.background = '#EF4444';
    setTimeout(() => { this.textContent = 'Log In →'; this.style.background = ''; }, 2000);
    return;
  }
  this.textContent = '✓ Logging in...';
  this.style.background = '#22C55E';
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
});
</script>
</body>
</html>
